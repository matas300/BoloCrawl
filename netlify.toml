[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin"]

# --- URL rewrites to Netlify Functions ---

[[redirects]]
  from = "/api/book"
  to = "/.netlify/functions/book"
  status = 200
  force = true

[[redirects]]
  from = "/api/export.csv"
  to = "/.netlify/functions/export"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/admin"
  status = 200
  force = true

# Root redirect for SEO stability.
# A fixed HTTP redirect is easier for Google to process than
# language-based redirects that vary by Accept-Language.
[[redirects]]
  from = "/"
  to = "/en/"
  status = 301

# --- Security headers for static pages ---

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache assets a lungo (hash su nome file se li versioni)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"