<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0b14"/>
      <stop offset="60%" stop-color="#15121f"/>
      <stop offset="100%" stop-color="#1e1a2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffb84d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.3" r="0.75">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo: Due Torri stilizzate -->
  <g transform="translate(80, 90)">
    <rect x="0" y="60" width="36" height="98" rx="5" fill="url(#accent)" transform="rotate(-5 18 109)"/>
    <rect x="60" y="20" width="36" height="138" rx="5" fill="url(#accent)" transform="rotate(4 78 89)"/>
    <rect x="10" y="90" width="14" height="14" fill="#0d0b14" opacity="0.55" transform="rotate(-5 18 97)"/>
    <rect x="70" y="50" width="14" height="14" fill="#0d0b14" opacity="0.55" transform="rotate(4 78 57)"/>
    <rect x="70" y="90" width="14" height="14" fill="#0d0b14" opacity="0.55" transform="rotate(4 78 97)"/>
  </g>

  <!-- Badge -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="380" height="44" rx="22" fill="#ffb84d" fill-opacity="0.12" stroke="#ffb84d" stroke-opacity="0.4"/>
    <text x="190" y="29" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#ffb84d" text-anchor="middle" letter-spacing="2">GIOVEDI · VENERDI · SABATO</text>
  </g>

  <!-- Wordmark -->
  <text x="80" y="440" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="110" font-weight="900" fill="url(#accent)" letter-spacing="-4">Bolo</text>
  <text x="310" y="440" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="110" font-weight="900" fill="#ffffff" letter-spacing="-4">Crawl</text>

  <!-- Subtitle -->
  <text x="80" y="490" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="500" fill="#a39cb0">Pub Crawl Bologna · 4 pub · shot di benvenuto · discoteca</text>

  <!-- Price badge bottom-right -->
  <g transform="translate(900, 360)">
    <circle cx="110" cy="110" r="110" fill="url(#accent)"/>
    <text x="110" y="100" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="900" fill="#1a1321" text-anchor="middle">€25</text>
    <text x="110" y="140" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#1a1321" text-anchor="middle" letter-spacing="2">ALL INCLUSIVE</text>
  </g>

  <!-- Bottom meta -->
  <text x="80" y="570" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="18" fill="#a39cb0">📍 Via del Pratello, Bologna · 21:00</text>
</svg>
